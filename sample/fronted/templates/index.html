<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Document</title>
  
  </head>
  <script>
    function senddata(){
      var fd=new FormData(document.querySelector('form'))
      var xhr=new XMLHttpRequest()
      xhr.open('POST','/predict')
      xhr.onreadystatechange=function(){
        if(xhr.readyState==XMLHttpRequest.DONE){
            document.getElementById('pr').innerHTML=xhr.responseText
        }
      }
      xhr.onload=function(){}
      xhr.send(fd)
    }
  </script>
  <body>
    <div class="container">
      <div class="row justify-content-center mt-5">
        <div class="col-7 border border-primary p-2">
          <h3 class="text-center text-danger">Welcome To Placement prediction System</h3>
          <form action="">
          <div>
            <label class="form-label">Enter CGPA</label>
            <input type="text" class="form-control" name="cgpa">
          </div>
            <div>
            <label class="form-label">Enter IQ</label>
            <input type="text" class="form-control" name="iq">
          </div>
          <input type="button" class="btn btn-primary mt-2" value="Predict Result" onclick="senddata()">
          </form>
          <div>
            <p id="pr"></p>
          </div>
        </div>

      </div>

    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
