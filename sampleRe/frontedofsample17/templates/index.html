<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Package Checker</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#ffb6c1,#ffd6d6);
}

.container{
    width:90%;
    max-width:500px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
    text-align:center;
}

h1{
    color:#333;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:2px solid #ddd;
    border-radius:10px;
    color:#333;
    font-size:16px;
}

input:focus{
    outline:none;
    border-color:#6be1ff;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:#ff4d6d;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#e63956;
}
</style>
</head>
<body>

<div class="container">
    <h1>Check Your Package</h1>

    <input type="number" placeholder="Enter Your CGPA">
    
    <input type="text" placeholder="Your Package" readonly>

    <button>Check Package</button>
</div>

</body>
</html>
