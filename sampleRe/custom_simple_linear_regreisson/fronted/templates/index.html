<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    
</head>
<script>
    function senddata(){
        var fd=new FormData(document.querySelector('form'))
        var xhr=new XMLHttpRequest()
        xhr.open('POST','/predict',true);
        xhr.onreadystatechange=function(){
            if(xhr.readyState=XMLHttpRequest.DONE){
                document.getElementById('weight').value=xhr.responseText
            }
        }
        xhr.onload=function(){}
        xhr.send(fd)

        
    }
</script>
<body>
  <center>  <div class="conatiner">
        <div class="row justify-content ">
            <div class=" col-7 border">
                <form action="">
                    <h4 class="text-center text-danger">welcome to weight predictor</h4>
                    <div>
                        <label class="form-label">
                            enter height</label>
                        <input type="text" name="height" class="form-cotrol">
                    </div>
                    <div>
                        <label class="form-label">
                            enter weight</label>
                        <input type="text" id="weight" class="form-cotrol">
                    </div>
                    <input type="button" class="btn btn-primary" value="predict weight" onclick="senddata()">
                </form>
            </div>
        </div>
    </div>
    </center>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
